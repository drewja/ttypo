name: Publish to AUR

# `release: published` won't fire when release.yml creates the release with
# GITHUB_TOKEN (GH guards against workflow-triggered loops). Listen for
# release.yml itself completing instead. workflow_dispatch is an escape
# hatch for manual reruns.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix), e.g. 0.1.21'
        required: true
        type: string

permissions:
  contents: read

jobs:
  ttypo:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
            echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          fi

      - name: Bump pkgver
        run: sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/aur/ttypo/PKGBUILD

      - uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ttypo
          pkgbuild: packaging/aur/ttypo/PKGBUILD
          commit_username: Andrew Arendt
          commit_email: andrewarendt@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "ttypo ${{ env.VERSION }}"
          updpkgsums: true
          test: true
          # Default --nodeps skips makedepends; use --syncdeps so makepkg
          # installs `cargo` via pacman before building.
          test_flags: --clean --cleanbuild --syncdeps --noconfirm

  ttypo-bin:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
            echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          fi

      - name: Bump pkgver
        run: sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/aur/ttypo-bin/PKGBUILD

      - uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ttypo-bin
          pkgbuild: packaging/aur/ttypo-bin/PKGBUILD
          commit_username: Andrew Arendt
          commit_email: andrewarendt@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "ttypo-bin ${{ env.VERSION }}"
          updpkgsums: true
          test: true
