<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ttypo</title>
    <link data-trunk rel="rust" />
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #0c0c0c;
        color: #d8d8d8;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 16px;
        height: 100%;
      }
      body {
        display: flex;
        align-items: stretch;
        justify-content: stretch;
      }
      /* ratzilla's DomBackend picks cells assuming 10px wide x 20px tall, but
         emits <pre style="height: 15px;"> with each cell as
         <span style="display: inline-block; width: 1ch;">. Force the row box
         to 20px and pin every cell to exactly 10px so the rendered grid lines
         up with the column/row count ratzilla picked from window.innerWidth. */
      pre {
        margin: 0 !important;
        height: 20px !important;
        line-height: 20px !important;
      }
      pre > span {
        width: 10px !important;
      }
    </style>
  </head>
  <body></body>
</html>
